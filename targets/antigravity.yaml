# Target: Antigravity (Google's agentic IDE + CLI, successor to Gemini CLI which
# retires 2026-06-18).
#
# ROLE: this is the dynamic ideation→speccing layer — where user works with
# virtual "departments" (product, design, marketing, etc.) to flesh out final scope
# before anything is built. The durable asset here is the captured department PERSONAS
# / session prompts (registry/skills targeting antigravity), used for one-off sessions
# until these tools mature enough to automate. Google is iterating fast on this layer,
# so the MCP tool-permission surface below is treated as BEST-EFFORT and volatile —
# not something to over-pin.
#
# Context comes from AGENTS.md (agents-md target — Antigravity reads it natively), so
# this target emits the MCP wiring, a best-effort tool allowlist, and the persona/skill
# prompts.
#
# Tool surface: regenerated FROM connections/servers.yaml (canonical core tier), which
# normalizes Antigravity to the same surface as Hermes (Gmail read-only, no draft —
# matching the `gws` skill's documented boundaries). Expand servers.yaml if a department
# workflow genuinely needs more; do not hand-edit the generated allowlist.

target: antigravity

server_alias: gws-mcp-local         # Antigravity refers to the gws server by this alias

# mcp_config.json — the server connection. Confirmed shared across Antigravity 2.0,
# IDE, and CLI (see docs/targets/antigravity.md).
mcp_config:
  filename: mcp_config.json
  deploy_to_key: antigravity_config
  render: antigravity_mcp_config    # { mcpServers: { <alias>: { url, serverUrl } } }
  drift_policy: protect

# config.json is the TOOL's own file — deploy performs a SURGICAL JSON MERGE (like the
# Hermes config.yaml mcp_servers merge): inside globalPermissionGrants.allow, only the
# compiler's own `mcp(<alias>/...)` entries are owned and replaced,
# command(...) grants, and any other keys are never touched.
#
# UNVERIFIED: this globalPermissionGrants.allow structure does not match any documented
# Gemini CLI or Antigravity CLI schema found during research (2026-07-08) — real Gemini
# CLI permission keys are `tools.allowed`/`mcpServers.<name>.trust` inside settings.json,
# not a separate config.json. Left in place pending further investigation — see
# docs/targets/antigravity.md's "Permissions file" note. Do not treat this block as a
# confirmed-correct reference when copying the pattern to a new target.
permissions:
  filename: config.json
  deploy_to_key: antigravity_config
  mode: json_merge
  owned: userSettings.globalPermissionGrants.allow   # only mcp(<alias>/…) entries within
  render: antigravity_permission_grants
  drift_policy: protect

# Skills targeting antigravity — plain markdown deployed to Antigravity's native skills
# dir. Antigravity CLI (successor to Gemini CLI, retiring 2026-06-18) reads the
# cross-vendor ~/.agents/skills/ convention (confirmed path; docs/targets/antigravity.md).
skills:
  include_target: antigravity
  mode: copy
  deploy_to_key: antigravity_skills
  subdir: "{name}.md"
  frontmatter: none
  drift_policy: harvest

# Prompts targeting antigravity — harness-agnostic text deployed as plain markdown.
# Same antigravity_skills directory as skills; prefixed "prompt-" to avoid name
# collisions with skills of the same name.
prompts:
  include_target: antigravity
  deploy_to_key: antigravity_skills
  subdir: "prompt-{name}.md"
  drift_policy: harvest
