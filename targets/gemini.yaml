# Target: Gemini CLI / Antigravity IDE.
#
# ROLE: this is the dynamic ideation→speccing layer — where user works with
# virtual "departments" (product, design, marketing, etc.) to flesh out final scope
# before anything is built. The durable asset here is the captured department PERSONAS
# / session prompts (registry/skills targeting gemini), used for one-off sessions until
# these tools mature enough to automate. Google is iterating fast on this layer, so the
# MCP tool-permission surface below is treated as BEST-EFFORT and volatile — not
# something to over-pin.
#
# Context comes from AGENTS.md (agents-md target — Antigravity reads it natively), so
# this target emits the MCP wiring, a best-effort tool allowlist, and the persona/skill
# prompts.
#
# Tool surface: regenerated FROM connections/servers.yaml (canonical core tier), which
# normalizes Gemini to the same surface as Hermes (Gmail read-only, no draft — matching
# the `gws` skill's documented boundaries). Expand servers.yaml if a department workflow
# genuinely needs more; do not hand-edit the generated allowlist.

target: gemini

server_alias: gws-mcp-local         # Gemini refers to the gws server by this alias

# mcp_config.json — the server connection.
mcp_config:
  filename: mcp_config.json
  deploy_to_key: gemini_config
  render: gemini_mcp_config         # { mcpServers: { <alias>: { url, serverUrl } } }
  drift_policy: protect

# config.json is the TOOL's own file — deploy performs a SURGICAL JSON MERGE (like the
# Hermes config.yaml mcp_servers merge): inside globalPermissionGrants.allow, only the
# compiler's own `mcp(<alias>/...)` entries are owned and replaced,
# command(...) grants, and any other keys are never touched.
permissions:
  filename: config.json
  deploy_to_key: gemini_config
  mode: json_merge
  owned: userSettings.globalPermissionGrants.allow   # only mcp(<alias>/…) entries within
  render: gemini_permission_grants
  drift_policy: protect

# Skills targeting gemini — plain markdown deployed to Antigravity's native skills dir.
# Antigravity reads ~/.gemini/skills/ (confirmed path; docs/targets/antigravity.md).
# Gemini CLI uses ~/.gemini/commands/ (TOML format) — not wired here until the format
# question is resolved (see docs/targets/gemini-cli.md).
skills:
  include_target: gemini
  mode: copy
  deploy_to_key: antigravity_skills
  subdir: "{name}.md"
  frontmatter: none
  drift_policy: harvest

# Prompts targeting gemini — harness-agnostic text deployed as plain markdown.
# Same antigravity_skills directory as skills; prefixed "prompt-" to avoid name
# collisions with skills of the same name.
prompts:
  include_target: gemini
  deploy_to_key: antigravity_skills
  subdir: "prompt-{name}.md"
  drift_policy: harvest
