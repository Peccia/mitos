# Target: Claude Code — per code-project context and skills.
# Emitted for each project that has a `local_path` on the machine being deployed to.
# No MCP wiring today: no project opts in. If one ever needs a project-local
# .mcp.json, add it as a `connections`-lane output — kept out of this target so
# content and wiring stay on separate lanes.

target: claude-code

# CLAUDE.md per project. For most projects this is identity + the project's repo/builder
# context. For the mitos project specifically, CLAUDE.md is a thin stub that imports
# the generated AGENTS.md (so Claude Code and AGENTS.md-native tools read identical
# context) — see `stub_import` below.
context_file:
  filename: CLAUDE.md
  sources: [identity/who-i-am.md, identity/security.md, identity/comms-style.md, identity/operating-rules.md, "{project.context.repo}"]
  drift_policy: protect
  # Projects listed here get a stub `@AGENTS.md` import instead of inlined context,
  # because their AGENTS.md is already generated by the agents-md target.
  stub_import:
    mitos: "@AGENTS.md"

# Skills — two scopes (the skill scoping design):
#   scope: project (explicit) — bound per project in the manifest (`skills:` in
#     registry/projects/<slug>.yaml) AND compatible (their `targets:` contains
#     "claude-code"). Deployed under .claude/skills/ in each bound project's checkout
#     only. A skill is reused across projects by naming it in each manifest, never copied.
#   scope: global (default, omitted) — deployed once to `claude_code_skills`, Claude
#     Code's personal/user-level skills directory (~/.claude/skills/), available in
#     every project on this machine without per-project binding.
skills:
  include_target: claude-code
  mode: copy
  subdir: .claude/skills/{name}          # project-scope deploy path (under local_path)
  deploy_to_key: claude_code_skills      # global-scope deploy path (personal skills dir)
  global_subdir: "{name}/SKILL.md"
  frontmatter: claude-code          # name + description only
  drift_policy: harvest

# Agents — Claude Code subagents authored once in registry/agents/<name>.md, bound per
# project in the manifest (`agents:`), deployed under .claude/agents/<name>.md in each
# bound project's checkout (the agents design).
agents:
  subdir: .claude/agents
  drift_policy: harvest

# Prompts — harness-agnostic prompts bound per project in the manifest (`prompts:` list)
# AND compatible (their `targets:` contains "claude-code"). Each prompt becomes a slash
# command: deployed as .claude/commands/<name>.md, invoked as /<name> in Claude Code.
# Rendered with `description:` frontmatter so the command picker shows the description.
prompts:
  subdir: .claude/commands
  drift_policy: harvest