# Example: Secondary Windows device (minimal config).
# Copy to registry/local/machines/ and customize for your setup.
name: example-windows-secondary
example: true   # template — copy into registry/local/machines/ and rename; not a live machine
os: windows
targets: [gemini, claude-ai, claude-code]
paths:
  projects_root: "C:/Projects"
  gemini_config: "~/.gemini/config"
  antigravity_skills: "~/.gemini/skills"
  claude_ai_staging: "~/ClaudeSkills"