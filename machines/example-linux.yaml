# Example: Linux machine running the Hermes assistant gateway.
# Copy to registry/local/machines/ and customize for your setup.
name: example-linux
example: true   # template — copy into registry/local/machines/ and rename; not a live machine
os: linux
targets: [hermes, agents-md]
paths:
  hermes_home: "~/.hermes"
  hermes_config: "~/.hermes/config.yaml"
  assistant_root: "~/MitosAgent"

# How `mitos sync --machine example-linux` reaches this box. Uncomment and set your own hub.
# Sync is git-only: the overlay (registry/local/) is a git repo synced to `hub` — any git URL
# (a server you host or a private GitHub repo). Secrets never go here. See docs/lan-sync.md.
# sync:
#   git:
#     hub: "ssh://you@gitserver/mitos-local.git"   # or git@github.com:you/mitos-local.git
#     # remote: origin            # optional (default origin)
#     # branch: main              # optional (default main)
#     # ssh_key: "~/.ssh/mitos"   # optional: a specific private key for an ssh hub
